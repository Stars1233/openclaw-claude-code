<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claw Orchestrator — Dashboard</title>
    <style>
      :root {
        --bg: #f7f7f8;
        --surface: #ffffff;
        --surface-2: #f0f0f0;
        --text: #1a1a1a;
        --muted: #6e6e73;
        --border: #e5e5e5;
        --accent: #10a37f;
        --accent-2: #cc785c;
        --warn: #d97706;
        --error: #dc2626;
        --info: #2563eb;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      a {
        color: var(--info);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        min-height: 52px;
      }
      .header h1 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.3px;
      }
      .tabs {
        display: flex;
        gap: 6px;
        margin-left: 12px;
      }
      .tab {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        font: inherit;
        color: var(--muted);
      }
      .tab[aria-selected='true'] {
        background: var(--surface-2);
        color: var(--text);
        border-color: var(--border);
      }
      .header .grow {
        flex: 1;
      }
      .header small {
        color: var(--muted);
      }

      .body {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      /* ── Sidebar (run / council list) ───────────────────────────── */
      .sidebar {
        width: 260px;
        border-right: 1px solid var(--border);
        background: var(--surface);
        overflow-y: auto;
      }
      .sidebar h2 {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin: 0;
        padding: 14px 16px 6px;
      }
      .runlist {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .runItem {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .runItem:hover {
        background: var(--surface-2);
      }
      .runItem[aria-selected='true'] {
        background: var(--surface-2);
        border-left: 3px solid var(--accent);
        padding-left: 13px;
      }
      .runItem .id {
        font-weight: 600;
        font-size: 13px;
        color: var(--text);
        word-break: break-all;
      }
      .runItem .meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .badge {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        background: var(--surface-2);
        color: var(--text);
      }
      .badge.running {
        background: #dcfce7;
        color: #166534;
      }
      .badge.paused {
        background: #fef3c7;
        color: #92400e;
      }
      .badge.terminated,
      .badge.consensus,
      .badge.accepted {
        background: #e0e7ff;
        color: #3730a3;
      }
      .badge.error,
      .badge.crashed,
      .badge.rejected,
      .badge.max_rounds {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge.planning,
      .badge.awaiting_user {
        background: #dbeafe;
        color: #1e40af;
      }

      /* ── Main pane ──────────────────────────────────────────────── */
      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        background: var(--bg);
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 10px 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        font-size: 13px;
      }
      .topbar .item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
      }
      .topbar .item strong {
        color: var(--text);
      }
      .panes {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        min-height: 0;
        gap: 1px;
        background: var(--border);
      }
      .panes .single {
        grid-column: 1 / -1;
      }
      .pane {
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--surface);
      }
      .paneHeader {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        font-weight: 600;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .paneBody {
        flex: 1;
        overflow-y: auto;
        padding: 10px 16px;
        font-size: 13px;
        line-height: 1.55;
      }
      .empty {
        color: var(--muted);
        font-style: italic;
        padding: 20px;
        text-align: center;
      }

      /* ── Chat / activity entries ────────────────────────────────── */
      .entry {
        margin-bottom: 14px;
        padding-bottom: 10px;
        border-bottom: 1px dashed var(--border);
      }
      .entry:last-child {
        border-bottom: none;
      }
      .entryHeader {
        display: flex;
        gap: 8px;
        align-items: baseline;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .entryHeader .who {
        font-weight: 600;
        color: var(--text);
      }
      .entryHeader .iter {
        background: var(--surface-2);
        padding: 1px 6px;
        border-radius: 4px;
      }
      .entryBody {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        background: #fafafa;
        padding: 8px 10px;
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      .entryBody.text {
        font-family: inherit;
        font-size: 13px;
        background: transparent;
        border: none;
        padding: 0;
      }
      .entryBody.verdict-advance {
        border-left: 3px solid var(--accent);
      }
      .entryBody.verdict-hold {
        border-left: 3px solid var(--warn);
      }
      .entryBody.verdict-rollback {
        border-left: 3px solid var(--error);
      }

      /* ── Chat compose for autoloop ──────────────────────────────── */
      .composer {
        display: flex;
        gap: 8px;
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        background: var(--surface);
      }
      .composer textarea {
        flex: 1;
        font: inherit;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        resize: vertical;
        min-height: 36px;
        max-height: 120px;
      }
      .composer button {
        padding: 0 16px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 6px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .composer button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Push log (bottom strip) ───────────────────────────────── */
      .pushlog {
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 6px 16px;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        max-height: 80px;
        overflow-y: auto;
      }
      .pushlog .item {
        white-space: nowrap;
      }

      .footer {
        padding: 6px 16px;
        font-size: 11px;
        color: var(--muted);
        text-align: right;
        border-top: 1px solid var(--border);
        background: var(--surface);
      }
      /* ─── Forge tab ──────────────────────────────────────────── */
      .forge-layout {
        display: grid;
        grid-template-columns: 1fr 380px;
        height: 100%;
        gap: 0;
      }
      .forge-chat {
        display: flex;
        flex-direction: column;
        padding: 16px;
        overflow: hidden;
        height: 100%;
      }
      .forge-mode {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        background: var(--surface-2);
        color: var(--muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        align-self: flex-start;
      }
      .forge-mode[data-mode='build'],
      .forge-mode[data-mode='building'] { background: var(--info); color: white; }
      .forge-mode[data-mode='done'],
      .forge-mode[data-mode='build-complete'] { background: var(--accent); color: white; }
      .forge-mode[data-mode='failed'] { background: var(--error); color: white; }
      .forge-mode[data-mode='queued'] { background: var(--warn); color: white; }
      .forge-empty {
        margin: auto;
        max-width: 440px;
        text-align: center;
        color: var(--muted);
      }
      .forge-messages {
        flex: 1;
        overflow-y: auto;
        padding-right: 8px;
        margin-bottom: 8px;
      }
      .forge-msg {
        padding: 6px 10px;
        margin: 4px 0;
        border-radius: 4px;
        font-size: 13px;
      }
      .forge-msg.user { background: #e0eaff; align-self: flex-end; }
      .forge-msg.assistant { background: var(--surface); border: 1px solid var(--border); }
      .forge-msg.system { background: var(--surface-2); color: var(--muted); font-size: 12px; }
      .forge-share {
        background: var(--surface);
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 12px;
        margin: 8px 0;
      }
      .forge-share strong { color: var(--accent); display: block; margin-bottom: 6px; }
      .forge-share a { color: var(--accent); word-break: break-all; }
      .forge-share-actions { display: flex; gap: 8px; margin-top: 10px; }
      .forge-share-actions button {
        padding: 4px 12px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 4px;
        cursor: pointer;
      }
      .forge-public-modal {
        max-width: 600px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .forge-public-modal pre {
        background: var(--surface-2);
        padding: 8px;
        border-radius: 4px;
        font-size: 12px;
        overflow-x: auto;
      }
      .forge-public-modal h4 { margin-bottom: 4px; }
      .runItem .lifecycle-actions {
        display: none;
        gap: 4px;
        margin-top: 4px;
      }
      .runItem:hover .lifecycle-actions { display: flex; }
      .lifecycle-actions button {
        font-size: 10px;
        padding: 2px 6px;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 3px;
        cursor: pointer;
      }
      .lifecycle-actions button:hover { background: var(--surface-2); }
      .forge-question {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        margin: 8px 0;
      }
      .forge-question .ctx { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
      .forge-question .q { font-weight: 600; margin-bottom: 8px; }
      .forge-question .opts { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
      .forge-question .opt {
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: 16px;
        cursor: pointer;
        font-size: 12px;
        background: var(--surface);
      }
      .forge-question .opt.recommended { border-color: var(--accent); }
      .forge-question .opt.selected { background: var(--accent); color: white; border-color: var(--accent); }
      .forge-input {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border);
      }
      .forge-input textarea {
        resize: vertical;
        font-family: inherit;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
      .forge-input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        margin-top: 4px;
      }
      .forge-input button {
        padding: 6px 14px;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
      }
      .forge-input button:disabled { opacity: 0.4; cursor: not-allowed; }
      .forge-spec {
        border-left: 1px solid var(--border);
        padding: 16px;
        overflow-y: auto;
        background: var(--surface-2);
        display: flex;
        flex-direction: column;
      }
      .forge-spec h3 { margin: 0 0 8px 0; }
      .forge-spec textarea {
        width: 100%;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 11px;
        padding: 6px;
        border: 1px solid var(--border);
        border-radius: 4px;
        flex: 1;
      }
      .forge-spec-actions {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        align-items: center;
      }
      .forge-spec-actions button {
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--surface);
        cursor: pointer;
      }
      .forge-spec-msg { font-size: 11px; color: var(--muted); }
      #forgeNew,
      #councilNew,
      #autoloopNew {
        margin: 8px 12px;
        padding: 6px 12px;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
        width: calc(100% - 24px);
      }
      #forgeNew:hover,
      #councilNew:hover,
      #autoloopNew:hover {
        filter: brightness(0.95);
      }

      /* ─── Launcher modal (Council / Autoloop forms) ─────────────── */
      .modal-root {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal-root[hidden] { display: none; }
      .modal {
        background: var(--surface);
        border-radius: 8px;
        min-width: 440px;
        max-width: 600px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
      }
      .modal-header h2 { margin: 0; font-size: 15px; }
      .modal-header button {
        background: transparent;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: var(--muted);
        padding: 0 6px;
      }
      .modal-body {
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .modal-body label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 12px;
        color: var(--muted);
      }
      .modal-body input,
      .modal-body textarea {
        padding: 6px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font: inherit;
        color: var(--text);
        background: var(--bg);
      }
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        padding: 12px 20px 18px;
      }
      .modal-footer button {
        padding: 6px 14px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: var(--surface);
        cursor: pointer;
        font: inherit;
      }
      .modal-footer button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .modal-footer button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      /* ─── Empty-state CTA ──────────────────────────────────────── */
      .empty-cta {
        text-align: center;
        margin: 80px auto 0;
        max-width: 420px;
      }
      .empty-cta h2 { margin: 0 0 8px; font-size: 16px; }
      .empty-cta p { margin: 0 0 16px; color: var(--muted); }
      .empty-cta button {
        padding: 8px 16px;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
        font: inherit;
      }
      #forgeStartBuild {
        margin-top: 8px;
        padding: 8px 14px;
        border-radius: 4px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-weight: 600;
      }
      #forgeStartBuild:disabled { opacity: 0.4; cursor: not-allowed; }
      .forge-versions { margin-top: 12px; }
      .forge-versions h4 { margin: 0 0 6px 0; font-size: 12px; color: var(--muted); text-transform: uppercase; }
      .version-list { list-style: none; padding: 0; margin: 0; }
      .version-row {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 4px 0;
        font-size: 12px;
        border-top: 1px solid var(--border);
      }
      .version-tag {
        background: var(--surface-2);
        padding: 1px 6px;
        border-radius: 3px;
        font-family: monospace;
        font-weight: 600;
      }
      .version-meta { color: var(--muted); }
      .version-row a { color: var(--accent); text-decoration: none; word-break: break-all; }
      .version-row button {
        margin-left: auto;
        padding: 2px 8px;
        font-size: 11px;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 3px;
        cursor: pointer;
      }
      .version-row button:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Claw Orchestrator</h1>
        <nav class="tabs" role="tablist">
          <button class="tab" role="tab" aria-selected="true" data-tab="autoloop">Autoloop</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="council">Council</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="forge">Forge</button>
        </nav>
        <div class="grow"></div>
        <small id="status">connected</small>
      </header>

      <div class="body">
        <aside class="sidebar">
          <h2 id="sidebarTitle">Runs</h2>
          <button id="autoloopNew" hidden>+ New autoloop</button>
          <button id="councilNew" hidden>+ New council</button>
          <button id="forgeNew" hidden>+ New forge</button>
          <ul class="runlist" id="runlist"></ul>
        </aside>

        <main class="main" id="main">
          <div class="empty" style="margin-top: 80px">Select a run to view.</div>
        </main>
      </div>

      <div class="footer">SSE-driven dashboard • served by claw-orchestrator embedded server</div>
    </div>

    <!-- ─── Launcher modal (tab-aware) ───────────────────────────────── -->
    <div id="modalRoot" class="modal-root" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-header">
          <h2 id="modalTitle">New run</h2>
          <button id="modalClose" type="button" aria-label="Close">×</button>
        </div>
        <form id="modalForm" class="modal-body" autocomplete="off">
          <!-- Council fields -->
          <div data-for-tab="council" style="display: contents">
            <label>
              Task
              <textarea
                name="task"
                rows="3"
                placeholder="What should the council achieve?"
              ></textarea>
            </label>
            <label>
              Project directory
              <input
                name="projectDir"
                type="text"
                placeholder="/abs/path/to/workspace"
              />
            </label>
            <label>
              Max rounds
              <input name="maxRounds" type="number" min="1" max="50" value="15" />
            </label>
          </div>
          <!-- Autoloop fields -->
          <div data-for-tab="autoloop" style="display: contents">
            <label>
              Workspace
              <input
                name="workspace"
                type="text"
                placeholder="/abs/path/to/git/workspace"
              />
            </label>
            <label>
              Planner model (optional)
              <input name="planner_model" type="text" placeholder="claude-opus-4-7" />
            </label>
          </div>
          <div class="modal-footer">
            <button type="button" id="modalCancel">Cancel</button>
            <button type="submit" id="modalSubmit" class="primary">Start</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      // ─── State ────────────────────────────────────────────────────
      const state = {
        tab: 'autoloop',
        selectedId: null,
        runs: [],
        // autoloop run-detail caches keyed by run_id
        autoloop: {
          state: null,
          plannerLog: [],
          coderLog: [],
          reviewerLog: [],
          pushLog: [],
          eventSource: null,
        },
        // council session detail
        council: {
          session: null,
          events: [],
          eventSource: null,
        },
        // forge run detail
        forge: {
          runId: null,
          spec: null,
          mode: 'interview',
          currentQuestion: null,
          eventSource: null,
        },
      };

      const $ = (id) => document.getElementById(id);
      const fmtTime = (iso) =>
        iso ? new Date(iso).toLocaleTimeString(undefined, { hour12: false }) : '';
      const escapeHtml = (s) =>
        String(s ?? '').replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c],
        );

      // ─── Tab switching ────────────────────────────────────────────
      document.querySelectorAll('.tab').forEach((b) => {
        b.addEventListener('click', () => switchTab(b.dataset.tab));
      });

      function switchTab(tab) {
        if (state.tab === tab) return;
        state.tab = tab;
        document.querySelectorAll('.tab').forEach((b) => {
          b.setAttribute('aria-selected', String(b.dataset.tab === tab));
        });
        $('sidebarTitle').textContent =
          tab === 'autoloop'
            ? 'Autoloop runs'
            : tab === 'council'
              ? 'Council sessions'
              : 'Forge apps';
        $('forgeNew').hidden = tab !== 'forge';
        $('councilNew').hidden = tab !== 'council';
        $('autoloopNew').hidden = tab !== 'autoloop';
        state.selectedId = null;
        closeStreams();
        renderEmptyMain();
        refreshList();
      }

      function closeStreams() {
        if (state.autoloop.eventSource) {
          state.autoloop.eventSource.close();
          state.autoloop.eventSource = null;
        }
        if (state.council.eventSource) {
          state.council.eventSource.close();
          state.council.eventSource = null;
        }
        if (state.forge.eventSource) {
          state.forge.eventSource.close();
          state.forge.eventSource = null;
        }
        // Reset caches.
        state.autoloop.state = null;
        state.autoloop.plannerLog = [];
        state.autoloop.coderLog = [];
        state.autoloop.reviewerLog = [];
        state.autoloop.pushLog = [];
        state.council.session = null;
        state.council.events = [];
        state.forge.runId = null;
        state.forge.spec = null;
        state.forge.currentQuestion = null;
        state.forge.mode = 'interview';
      }

      function renderEmptyMain() {
        // When the sidebar list is empty, invite the user to start their
        // first run. Otherwise just say "pick one". The button delegates
        // to the same launcher trigger as the sidebar "+ New" button.
        const labels = {
          autoloop: 'autoloop run',
          council: 'council session',
          forge: 'forge app',
        };
        const noun = labels[state.tab] || 'run';
        if (state.runs.length === 0) {
          const triggerId =
            state.tab === 'autoloop'
              ? 'autoloopNew'
              : state.tab === 'council'
                ? 'councilNew'
                : 'forgeNew';
          $('main').innerHTML = `
            <div class="empty empty-cta">
              <h2>No ${escapeHtml(noun)}s yet</h2>
              <p>Click <strong>+ New</strong> in the sidebar to start your first one.</p>
              <button type="button" onclick="document.getElementById('${triggerId}').click()">+ New ${escapeHtml(noun)}</button>
            </div>
          `;
        } else {
          $('main').innerHTML =
            '<div class="empty" style="margin-top:80px">Select a run to view.</div>';
        }
      }

      // ─── List polling ─────────────────────────────────────────────
      async function refreshList() {
        try {
          const url =
            state.tab === 'autoloop'
              ? '/autoloop/list'
              : state.tab === 'council'
                ? '/council/list'
                : '/ultraapp/list';
          const opts = state.tab === 'forge' ? { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' } : {};
          const r = await fetch(url, opts);
          const j = await r.json();
          state.runs =
            state.tab === 'autoloop'
              ? j.runs || []
              : state.tab === 'council'
                ? j.councils || []
                : j.runs || [];
          renderList();
          // Refresh the empty-state CTA — runs may have just appeared or
          // disappeared, and renderEmptyMain's text depends on state.runs.length.
          if (!state.selectedId) renderEmptyMain();
          $('status').textContent = 'connected';
        } catch (err) {
          $('status').textContent = 'disconnected';
        }
      }
      setInterval(refreshList, 5000);

      function renderList() {
        const ul = $('runlist');
        if (state.runs.length === 0) {
          const noun =
            state.tab === 'autoloop' ? 'runs' : state.tab === 'council' ? 'councils' : 'apps';
          ul.innerHTML =
            '<li class="empty" style="padding:20px;list-style:none">No active ' +
            noun +
            '.</li>';
          return;
        }
        const html = state.runs
          .map((r) => {
            if (state.tab === 'autoloop') {
              return `
                <li class="runItem" data-id="${escapeHtml(r.run_id)}" aria-selected="${r.run_id === state.selectedId}">
                  <div class="id">${escapeHtml(r.run_id)}</div>
                  <div class="meta">
                    <span class="badge ${r.status}">${r.status}</span>
                    <span>iter ${r.iter}</span>
                    <span>↑${r.push_log_count}</span>
                  </div>
                  <div class="lifecycle-actions">
                    <button data-act="delete">Delete</button>
                  </div>
                </li>`;
            } else if (state.tab === 'council') {
              return `
                <li class="runItem" data-id="${escapeHtml(r.id)}" aria-selected="${r.id === state.selectedId}">
                  <div class="id">${escapeHtml(r.id)}</div>
                  <div class="meta">
                    <span class="badge ${r.status}">${r.status}</span>
                    <span>${r.responses?.length ?? 0} resp</span>
                  </div>
                </li>`;
            } else {
              const showLifecycle = r.mode === 'done' || r.mode === 'failed' || r.mode === 'build-complete';
              const lifecycleHtml = showLifecycle
                ? `<div class="lifecycle-actions">
                     ${r.mode === 'done' ? `<button data-act="stop">Stop</button>` : ''}
                     ${r.mode !== 'done' ? `<button data-act="start">Start</button>` : ''}
                     <button data-act="delete">Delete</button>
                   </div>`
                : '';
              return `
                <li class="runItem" data-id="${escapeHtml(r.runId)}" aria-selected="${r.runId === state.selectedId}">
                  <div class="id">${escapeHtml(r.title || r.runId)}</div>
                  <div class="meta">
                    <span class="badge ${r.mode}">${r.mode}</span>
                  </div>
                  ${lifecycleHtml}
                </li>`;
            }
          })
          .join('');
        ul.innerHTML = html;
        ul.querySelectorAll('.runItem').forEach((el) => {
          // Click on item itself (not action button) opens it
          el.addEventListener('click', (ev) => {
            const t = ev.target;
            if (t && t.closest('.lifecycle-actions')) return;
            state.selectedId = el.dataset.id;
            renderList();
            openDetail(el.dataset.id);
          });
          el.querySelectorAll('.lifecycle-actions button').forEach((btn) => {
            btn.addEventListener('click', async (ev) => {
              ev.stopPropagation();
              const action = btn.dataset.act;
              const id = el.dataset.id;
              if (state.tab === 'autoloop') {
                if (action !== 'delete') return;
                if (!confirm(`Delete autoloop run "${id}"? The registry entry is removed; the ledger directory under tasks/${id}/ is kept on disk.`)) return;
                try {
                  const r = await fetch(`/autoloop/${encodeURIComponent(id)}/delete`, { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' });
                  if (!r.ok) {
                    let detail = `HTTP ${r.status}`;
                    try { const j = await r.json(); if (j && j.error) detail = j.error; } catch { /* ignore */ }
                    alert(`Delete failed: ${detail}`);
                    return;
                  }
                  // If we were viewing this run, close the detail pane and pick another.
                  if (state.selectedId === id) {
                    closeStreams();
                    state.selectedId = null;
                    $('main').innerHTML = '<div class="empty">Select a run from the left.</div>';
                  }
                } catch (err) {
                  alert(`Delete failed: ${(err && err.message) || err}`);
                  return;
                }
                refreshList();
                return;
              }
              if (action === 'delete' && !confirm('Delete this run? Container, image, and on-disk artifacts are removed.')) return;
              await forgeLifecycleAction(id, action);
              refreshList();
            });
          });
        });
      }

      // ─── Detail open ──────────────────────────────────────────────
      function openDetail(id) {
        closeStreams();
        if (state.tab === 'autoloop') openAutoloop(id);
        else if (state.tab === 'council') openCouncil(id);
        else openForgeRun(id);
      }

      // ─── Forge ────────────────────────────────────────────────────
      $('forgeNew').addEventListener('click', async () => {
        const r = await fetch('/ultraapp/new', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });
        const j = await r.json();
        if (!j.ok) {
          alert('Failed to create run: ' + (j.error || 'unknown'));
          return;
        }
        state.selectedId = j.runId;
        await refreshList();
        openForgeRun(j.runId);
      });

      function renderForgeShell() {
        $('main').innerHTML = `
          <div class="forge-layout">
            <div class="forge-chat">
              <div class="forge-mode" id="forgeMode" data-mode="interview">interview</div>
              <div class="forge-messages" id="forgeMessages"></div>
              <div class="forge-input">
                <textarea id="forgeFreeform" placeholder="Free-form input (or click an option above and Submit)" rows="2"></textarea>
                <button id="forgeSubmit">Submit</button>
              </div>
              <div class="forge-input-row">
                <input type="file" id="forgeFile" multiple />
                <input type="text" id="forgePath" placeholder="…or paste an absolute path" />
              </div>
            </div>
            <div class="forge-spec">
              <h3>AppSpec</h3>
              <textarea id="forgeSpecJson" rows="20" spellcheck="false"></textarea>
              <div class="forge-spec-actions">
                <button id="forgeSpecApply">Apply edit</button>
                <span class="forge-spec-msg" id="forgeSpecMsg"></span>
              </div>
              <button id="forgeStartBuild" disabled>Start Build</button>
              <div id="forgeVersions" class="forge-versions"></div>
            </div>
          </div>
        `;
        $('forgeSubmit').addEventListener('click', forgeOnSubmit);
        $('forgeSpecApply').addEventListener('click', forgeOnSpecApply);
        $('forgeStartBuild').addEventListener('click', forgeOnStartBuild);
      }

      async function forgeOnStartBuild() {
        const runId = state.forge.runId;
        if (!runId) return;
        const btn = $('forgeStartBuild');
        if (btn) btn.disabled = true;
        try {
          const r = await fetch('/ultraapp/' + encodeURIComponent(runId) + '/build', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          const j = await r.json();
          if (!j.ok) {
            renderChatEntry({ role: 'system', kind: 'error', text: '[error] start build: ' + (j.error || 'unknown') });
            if (btn) btn.disabled = false;
          }
        } catch (err) {
          renderChatEntry({ role: 'system', kind: 'error', text: '[error] start build: ' + err.message });
          if (btn) btn.disabled = false;
        }
      }

      async function openForgeRun(runId) {
        state.forge.runId = runId;
        renderForgeShell();
        try {
          const r = await fetch('/ultraapp/' + encodeURIComponent(runId), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          const j = await r.json();
          if (!j.ok) {
            $('forgeMessages').textContent = 'error: ' + (j.error || 'unknown');
            return;
          }
          state.forge.spec = j.spec;
          state.forge.mode = j.state.mode;
          renderSpec(j.spec);
          setForgeMode(j.state.mode);
          for (const e of j.chat || []) renderChatEntry(e);
        } catch (err) {
          $('forgeMessages').textContent = 'fetch failed: ' + err.message;
          return;
        }
        const es = new EventSource('/ultraapp/' + encodeURIComponent(runId) + '/events');
        state.forge.eventSource = es;
        es.addEventListener('ultraapp', (ev) => {
          const data = JSON.parse(ev.data);
          if (data.type === 'question') renderQuestion(data.question);
          else if (data.type === 'spec-updated') {
            state.forge.spec = data.spec;
            renderSpec(data.spec);
          } else if (data.type === 'chat') renderChatEntry(data.entry);
          else if (data.type === 'interview-complete') {
            renderChatEntry({ role: 'system', kind: 'narrator', text: 'Interview complete: ' + data.summary });
            $('forgeStartBuild').disabled = false;
          } else if (data.type === 'build-event') {
            const ev = data.event;
            if (ev.type === 'queued') setForgeMode('queued');
            else if (ev.type === 'build-start') setForgeMode('building');
            else if (ev.type === 'build-complete') setForgeMode('build-complete');
            else if (ev.type === 'build-failed') {
              setForgeMode('failed');
              const btn = $('forgeStartBuild');
              if (btn) btn.disabled = false;
            } else if (ev.type === 'build-cancelled') {
              setForgeMode('failed');
              const btn = $('forgeStartBuild');
              if (btn) btn.disabled = false;
            }
          } else if (data.type === 'app-url') {
            setForgeMode('done');
            renderShareCard(data.url, data.version);
          } else if (data.type === 'error') {
            renderChatEntry({ role: 'system', kind: 'error', text: '[error] ' + data.message });
          }
        });
        es.onerror = () => {
          /* allow auto-reconnect */
        };
      }

      function setForgeMode(m) {
        state.forge.mode = m;
        const el = $('forgeMode');
        if (el) {
          el.dataset.mode = m;
          el.textContent = m;
        }
        const btn = $('forgeStartBuild');
        if (btn) {
          // Disabled while interview, queued, or building. Enabled at any
          // resting state from which a (re)build is sensible.
          const lockedModes = new Set(['interview', 'queued', 'building']);
          btn.disabled = lockedModes.has(m);
        }
        // Hint the input's role per mode (interview = answer; done = feedback).
        const ff = $('forgeFreeform');
        if (ff) {
          ff.placeholder =
            m === 'done'
              ? 'Done — type feedback (e.g. "make button green" / "add a thumbnail step")'
              : 'Free-form input (or click an option above and Submit)';
        }
        // Refresh versions panel when entering a state that may have artifacts.
        if (m === 'done' || m === 'build-complete') {
          void forgeRefreshVersions();
        }
      }

      function renderSpec(spec) {
        const ta = $('forgeSpecJson');
        if (!ta) return;
        if (document.activeElement !== ta) {
          ta.value = JSON.stringify(spec, null, 2);
        }
      }

      function renderChatEntry(entry) {
        const m = $('forgeMessages');
        if (!m) return;
        const div = document.createElement('div');
        div.className = 'forge-msg ' + entry.role;
        div.textContent = entry.text;
        m.appendChild(div);
        m.scrollTop = m.scrollHeight;
      }

      function renderShareCard(url, version) {
        const m = $('forgeMessages');
        if (!m) return;
        const card = document.createElement('div');
        card.className = 'forge-share';
        card.innerHTML =
          `<strong>App deployed (${escapeHtml(version)})</strong>` +
          `<div><a href="${escapeHtml(url)}" target="_blank">${escapeHtml(url)}</a></div>` +
          `<div class="forge-share-actions">` +
          `<button data-act="copy">Copy</button>` +
          `<button data-act="open">Open</button>` +
          `<button data-act="public">Make Public…</button>` +
          `</div>`;
        card.querySelector('[data-act="copy"]').addEventListener('click', () => {
          navigator.clipboard?.writeText(url);
        });
        card.querySelector('[data-act="open"]').addEventListener('click', () => {
          window.open(url, '_blank');
        });
        card.querySelector('[data-act="public"]').addEventListener('click', () => openPublicModal(url));
        m.appendChild(card);
        m.scrollTop = m.scrollHeight;
      }

      function openPublicModal(localUrl) {
        const dlg = document.createElement('dialog');
        dlg.className = 'forge-public-modal';
        const u = new URL(localUrl);
        dlg.innerHTML =
          `<h3>Make this app public</h3>` +
          `<p>This app currently only runs on your machine. To share it, expose port ${escapeHtml(String(u.port || '19000'))} with one of these tools:</p>` +
          `<h4>Cloudflare Tunnel</h4>` +
          `<pre>cloudflared tunnel --url ${escapeHtml(u.origin)}</pre>` +
          `<h4>ngrok</h4>` +
          `<pre>ngrok http ${escapeHtml(u.port || '19000')}</pre>` +
          `<h4>Tailscale Funnel</h4>` +
          `<pre>tailscale serve --bg ${escapeHtml(u.origin)}</pre>` +
          `<h4>Self-hosted (Caddy)</h4>` +
          `<pre>example.com {\n  reverse_proxy ${escapeHtml(u.host)}\n}</pre>` +
          `<p>Once exposed, your app will be reachable at <code>{your-public-host}${escapeHtml(u.pathname)}</code>.</p>` +
          `<button data-act="close">Close</button>`;
        document.body.appendChild(dlg);
        dlg.showModal();
        dlg.querySelector('[data-act="close"]').addEventListener('click', () => {
          dlg.close();
          dlg.remove();
        });
      }

      async function forgeLifecycleAction(runId, action) {
        try {
          const r = await fetch('/ultraapp/' + encodeURIComponent(runId) + '/' + action, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          const j = await r.json();
          if (!j.ok) {
            renderChatEntry({ role: 'system', kind: 'error', text: '[error] ' + action + ': ' + (j.error || 'unknown') });
          }
          if (action === 'delete' && j.ok && state.forge.runId === runId) {
            // Run is gone — close it and refresh sidebar
            state.forge.runId = null;
            $('forgeMessages').innerHTML = '';
          }
        } catch (err) {
          renderChatEntry({ role: 'system', kind: 'error', text: '[error] ' + action + ': ' + err.message });
        }
      }

      function renderQuestion(q) {
        state.forge.currentQuestion = q;
        const m = $('forgeMessages');
        if (!m) return;
        const card = document.createElement('div');
        card.className = 'forge-question';
        card.innerHTML =
          (q.context ? `<div class="ctx">${escapeHtml(q.context)}</div>` : '') +
          `<div class="q">${escapeHtml(q.question)}</div>` +
          `<div class="opts">` +
          q.options
            .map(
              (o) =>
                `<span class="opt ${o.value === q.recommended ? 'recommended' : ''}" data-val="${escapeHtml(o.value)}">${escapeHtml(o.label)}</span>`,
            )
            .join('') +
          `</div>`;
        card.querySelectorAll('.opt').forEach((el) => {
          el.addEventListener('click', () => {
            card.querySelectorAll('.opt').forEach((x) => x.classList.remove('selected'));
            el.classList.add('selected');
            state.forge.currentQuestion._selected = el.dataset.val;
          });
        });
        m.appendChild(card);
        m.scrollTop = m.scrollHeight;
      }

      async function forgeOnSubmit() {
        const runId = state.forge.runId;
        if (!runId) return;
        const ff = $('forgeFreeform');
        const path = $('forgePath');
        const fileInput = $('forgeFile');

        for (const f of fileInput.files) {
          const buf = await f.arrayBuffer();
          const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
          await fetch('/ultraapp/' + encodeURIComponent(runId) + '/files', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ filename: f.name, dataB64: b64 }),
          });
        }
        fileInput.value = '';

        if (path.value.trim()) {
          await fetch('/ultraapp/' + encodeURIComponent(runId) + '/files', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ absolutePath: path.value.trim() }),
          });
          path.value = '';
        }

        const freeform = ff.value.trim();
        const selected = state.forge.currentQuestion?._selected;
        // Mode-aware routing: in done mode, free-form text is feedback,
        // not an interview answer. /feedback runs through the classifier
        // and routes to patcher / spec-delta / structural-suggest.
        if (state.forge.mode === 'done' && freeform) {
          await fetch('/ultraapp/' + encodeURIComponent(runId) + '/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: freeform }),
          });
          ff.value = '';
          return;
        }
        if (freeform || selected) {
          const body = freeform ? { value: selected ?? '', freeform } : { value: selected };
          await fetch('/ultraapp/' + encodeURIComponent(runId) + '/answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          ff.value = '';
          state.forge.currentQuestion = null;
        }
      }

      async function forgeRefreshVersions() {
        const runId = state.forge.runId;
        if (!runId) return;
        const panel = $('forgeVersions');
        if (!panel) return;
        try {
          const r = await fetch('/ultraapp/' + encodeURIComponent(runId) + '/artifacts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: '{}',
          });
          const j = await r.json();
          if (!j.ok || !j.artifacts || j.artifacts.length === 0) {
            panel.innerHTML = '';
            return;
          }
          const html = j.artifacts
            .map((a) => {
              const isDeployed = !!a.deploy;
              const url = a.deploy?.url || '';
              return `<li class="version-row">
                <span class="version-tag">${escapeHtml(a.version)}</span>
                <span class="version-meta">${a.builtAt ? new Date(a.builtAt).toLocaleString() : ''}</span>
                ${isDeployed ? `<a href="${escapeHtml(url)}" target="_blank">${escapeHtml(url)}</a>` : '<span class="version-meta">(not deployed)</span>'}
                ${isDeployed ? `<button data-promote="${escapeHtml(a.version)}">Promote</button>` : ''}
              </li>`;
            })
            .join('');
          panel.innerHTML = '<h4>Versions</h4><ul class="version-list">' + html + '</ul>';
          panel.querySelectorAll('button[data-promote]').forEach((btn) => {
            btn.addEventListener('click', async () => {
              const v = btn.dataset.promote;
              if (!confirm(`Promote ${v} as the deployed version?`)) return;
              btn.disabled = true;
              const r = await fetch('/ultraapp/' + encodeURIComponent(runId) + '/promote-version', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ version: v }),
              });
              const j = await r.json();
              if (!j.ok) {
                renderChatEntry({ role: 'system', kind: 'error', text: '[error] promote: ' + (j.error || 'unknown') });
              }
              btn.disabled = false;
              await forgeRefreshVersions();
            });
          });
        } catch (err) {
          /* best-effort */
        }
      }

      async function forgeOnSpecApply() {
        const runId = state.forge.runId;
        if (!runId) return;
        const msg = $('forgeSpecMsg');
        msg.textContent = '';
        let next;
        try {
          next = JSON.parse($('forgeSpecJson').value);
        } catch (e) {
          msg.textContent = 'JSON parse error: ' + e.message;
          return;
        }
        const r = await fetch('/ultraapp/' + encodeURIComponent(runId) + '/spec-edit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ patch: [{ op: 'replace', path: '', value: next }] }),
        });
        const j = await r.json();
        msg.textContent = j.ok ? 'Saved.' : 'Error: ' + (j.error ?? 'unknown');
      }

      // ─── Autoloop detail ──────────────────────────────────────────
      function renderAutoloopShell() {
        $('main').innerHTML = `
          <div class="topbar">
            <div class="item">run <strong id="auto-id">…</strong></div>
            <div class="item">status <strong id="auto-status">…</strong></div>
            <div class="item">iter <strong id="auto-iter">0</strong></div>
            <div class="item">subagents <strong id="auto-sub">no</strong></div>
            <div class="item">pushes <strong id="auto-push">0</strong></div>
          </div>
          <div class="panes">
            <section class="pane">
              <div class="paneHeader">Planner ⇄ user</div>
              <div class="paneBody" id="auto-planner"><div class="empty">Waiting…</div></div>
              <div class="composer">
                <textarea id="auto-input" placeholder="Send to planner…  (Cmd/Ctrl+Enter)"></textarea>
                <button id="auto-send">Send</button>
              </div>
            </section>
            <section class="pane">
              <div class="paneHeader">Coder activity</div>
              <div class="paneBody" id="auto-coder"><div class="empty">Coder not yet spawned.</div></div>
            </section>
            <section class="pane">
              <div class="paneHeader">Reviewer verdicts</div>
              <div class="paneBody" id="auto-reviewer"><div class="empty">No verdicts yet.</div></div>
            </section>
          </div>
          <div class="pushlog" id="auto-pushlog"><span class="item">No pushes yet.</span></div>
        `;
        $('auto-send').addEventListener('click', sendAutoloopChat);
        $('auto-input').addEventListener('keydown', (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendAutoloopChat();
        });
      }

      async function openAutoloop(id) {
        renderAutoloopShell();
        $('auto-id').textContent = id;
        // Initial state fetch
        try {
          const r = await fetch(`/autoloop/${encodeURIComponent(id)}/state`);
          const j = await r.json();
          if (j.ok) {
            state.autoloop.state = j.state;
            paintAutoloopState();
          }
          const logR = await fetch(`/autoloop/${encodeURIComponent(id)}/push_log`);
          const logJ = await logR.json();
          if (logJ.ok) {
            state.autoloop.pushLog = logJ.entries || [];
            paintPushLog();
          }
          // Replay chat history from <ledger>/chat.jsonl so a refresh /
          // reopening a terminated run shows the prior conversation. New
          // entries that arrive via SSE (planner_reply) get appended on top.
          const histR = await fetch(`/autoloop/${encodeURIComponent(id)}/chat_history`);
          if (histR.ok) {
            const histJ = await histR.json();
            if (histJ.ok && Array.isArray(histJ.entries)) {
              state.autoloop.plannerLog = histJ.entries
                .filter((e) => e && typeof e.text === 'string')
                .map((e) => ({ who: e.who || 'planner', text: e.text, ts: e.ts || '' }));
              paintPlanner();
            }
          }
          // For terminated runs, surface a Resume affordance under the
          // top bar. The button kicks off /autoloop/<id>/resume and then
          // re-runs openAutoloop so SSE reconnects with the live state.
          if (state.autoloop.state && state.autoloop.state.status === 'terminated') {
            const bar = document.querySelector('.topbar');
            if (bar && !document.getElementById('auto-resume')) {
              const btn = document.createElement('button');
              btn.id = 'auto-resume';
              btn.textContent = 'Resume run';
              btn.style.cssText =
                'padding:6px 12px;border:1px solid var(--border);background:var(--accent);color:#fff;border-radius:6px;cursor:pointer;font:inherit;font-weight:600;margin-left:auto';
              btn.addEventListener('click', async () => {
                btn.disabled = true;
                btn.textContent = 'Resuming…';
                try {
                  const r2 = await fetch(`/autoloop/${encodeURIComponent(id)}/resume`, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: '{}',
                  });
                  if (!r2.ok) {
                    const j2 = await r2.json().catch(() => ({}));
                    alert(`Resume failed: ${(j2 && j2.error) || `HTTP ${r2.status}`}`);
                    btn.disabled = false;
                    btn.textContent = 'Resume run';
                    return;
                  }
                  closeStreams();
                  openAutoloop(id);
                } catch (err) {
                  alert(`Resume failed: ${(err && err.message) || err}`);
                  btn.disabled = false;
                  btn.textContent = 'Resume run';
                }
              });
              bar.appendChild(btn);
            }
          }
        } catch (err) {
          /* ignore */
        }
        // SSE
        const es = new EventSource(`/autoloop/${encodeURIComponent(id)}/events`);
        state.autoloop.eventSource = es;
        es.addEventListener('snapshot', (e) => {
          const data = JSON.parse(e.data);
          if (data.state) {
            state.autoloop.state = data.state;
            paintAutoloopState();
          }
        });
        es.addEventListener('state', (e) => {
          state.autoloop.state = JSON.parse(e.data);
          paintAutoloopState();
        });
        es.addEventListener('planner_reply', (e) => {
          const { text } = JSON.parse(e.data);
          // Clear the "waiting…" placeholder, if any, before appending the reply.
          state.autoloop.plannerLog = state.autoloop.plannerLog.filter((m) => m.who !== 'pending');
          state.autoloop.plannerLog.push({ who: 'planner', text, ts: new Date().toISOString() });
          paintPlanner();
        });
        es.addEventListener('planner_error', (e) => {
          const { message } = JSON.parse(e.data);
          state.autoloop.plannerLog = state.autoloop.plannerLog.filter((m) => m.who !== 'pending');
          state.autoloop.plannerLog.push({
            who: 'system',
            text: `[planner error] ${message}`,
            ts: new Date().toISOString(),
          });
          paintPlanner();
        });
        es.addEventListener('coder_reply', (e) => {
          const { text } = JSON.parse(e.data);
          state.autoloop.coderLog.push({ who: 'coder', text, ts: new Date().toISOString() });
          paintCoder();
        });
        es.addEventListener('reviewer_reply', (e) => {
          const { text } = JSON.parse(e.data);
          state.autoloop.reviewerLog.push({ who: 'reviewer', text, ts: new Date().toISOString() });
          paintReviewer();
        });
        es.addEventListener('iter_done', (e) => {
          const data = JSON.parse(e.data);
          state.autoloop.reviewerLog.push({
            who: 'iter_done',
            text: `iter ${data.iter} → ${data.verdict}` + (data.metric != null ? ` · metric=${data.metric}` : ''),
            verdict: data.verdict,
            ts: new Date().toISOString(),
          });
          paintReviewer();
        });
        es.addEventListener('push', (e) => {
          state.autoloop.pushLog.push({
            ts: new Date().toISOString(),
            ...JSON.parse(e.data),
          });
          paintPushLog();
        });
        es.addEventListener('terminated', (e) => {
          const data = JSON.parse(e.data);
          state.autoloop.plannerLog.push({
            who: 'system',
            text: `[terminated] ${data.reason ?? ''}`,
            ts: new Date().toISOString(),
          });
          paintPlanner();
        });
        es.addEventListener('compact', (e) => {
          const data = JSON.parse(e.data);
          const entry = {
            who: 'system',
            text: `[auto-compact ${data.percent.toFixed(0)}% ≥ ${data.threshold}% — /compact dispatched]`,
            ts: new Date().toISOString(),
          };
          if (data.agent === 'planner') {
            state.autoloop.plannerLog.push(entry);
            paintPlanner();
          } else if (data.agent === 'coder') {
            state.autoloop.coderLog.push(entry);
            paintCoder();
          } else if (data.agent === 'reviewer') {
            state.autoloop.reviewerLog.push(entry);
            paintReviewer();
          }
        });
      }

      function paintAutoloopState() {
        const s = state.autoloop.state;
        if (!s) return;
        $('auto-status').innerHTML = `<span class="badge ${s.status}">${s.status}</span>`;
        $('auto-iter').textContent = s.iter;
        $('auto-sub').textContent = s.subagents_spawned ? 'yes' : 'no';
        $('auto-push').textContent = s.push_log_count;
      }

      function paintPlanner() {
        const el = $('auto-planner');
        if (!el) return;
        const items = state.autoloop.plannerLog;
        if (!items.length) {
          el.innerHTML = '<div class="empty">Waiting…</div>';
          return;
        }
        el.innerHTML = items
          .map(
            (e) =>
              `<div class="entry">
                <div class="entryHeader"><span class="who">${escapeHtml(e.who)}</span><span>${fmtTime(e.ts)}</span></div>
                <div class="entryBody text">${escapeHtml(e.text)}</div>
              </div>`,
          )
          .join('');
        el.scrollTop = el.scrollHeight;
      }
      function paintCoder() {
        const el = $('auto-coder');
        if (!el) return;
        const items = state.autoloop.coderLog;
        if (!items.length) {
          el.innerHTML = '<div class="empty">Coder not yet spawned.</div>';
          return;
        }
        el.innerHTML = items
          .map(
            (e) =>
              `<div class="entry">
                <div class="entryHeader"><span class="who">${escapeHtml(e.who)}</span><span>${fmtTime(e.ts)}</span></div>
                <div class="entryBody">${escapeHtml(e.text)}</div>
              </div>`,
          )
          .join('');
        el.scrollTop = el.scrollHeight;
      }
      function paintReviewer() {
        const el = $('auto-reviewer');
        if (!el) return;
        const items = state.autoloop.reviewerLog;
        if (!items.length) {
          el.innerHTML = '<div class="empty">No verdicts yet.</div>';
          return;
        }
        el.innerHTML = items
          .map((e) => {
            const cls = e.verdict ? `verdict-${e.verdict}` : '';
            return `<div class="entry">
              <div class="entryHeader"><span class="who">${escapeHtml(e.who)}</span><span>${fmtTime(e.ts)}</span></div>
              <div class="entryBody ${cls}">${escapeHtml(e.text)}</div>
            </div>`;
          })
          .join('');
        el.scrollTop = el.scrollHeight;
      }
      function paintPushLog() {
        const el = $('auto-pushlog');
        if (!el) return;
        const items = state.autoloop.pushLog;
        if (!items.length) {
          el.innerHTML = '<span class="item">No pushes yet.</span>';
          return;
        }
        el.innerHTML = items
          .slice(-20)
          .map(
            (e) =>
              `<span class="item">${fmtTime(e.ts)} <strong>${escapeHtml(e.level || '')}</strong> ${escapeHtml(e.summary || '')}</span>`,
          )
          .join(' · ');
      }

      async function sendAutoloopChat() {
        const id = state.selectedId;
        if (!id) return;
        const ta = $('auto-input');
        const text = ta.value.trim();
        if (!text) return;
        const btn = $('auto-send');
        btn.disabled = true;
        ta.disabled = true;
        // Clear input optimistically — the message is already echoed in the
        // planner log below, and the new server contract is fire-and-forget
        // (returns 202 immediately; reply streams via SSE). If the POST fails
        // synchronously we surface the error in the log.
        ta.value = '';
        state.autoloop.plannerLog.push({ who: 'user', text, ts: new Date().toISOString() });
        state.autoloop.plannerLog.push({
          who: 'pending',
          text: 'Planner is thinking…',
          ts: new Date().toISOString(),
        });
        paintPlanner();
        try {
          const r = await fetch(`/autoloop/${encodeURIComponent(id)}/chat`, {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ text }),
          });
          // Server returns 202 on accepted (queued); 200 is also fine for
          // legacy clients. Anything else is a real failure.
          if (!r.ok) {
            let detail = `HTTP ${r.status}`;
            try {
              const j = await r.json();
              if (j && typeof j.error === 'string') detail = j.error;
            } catch {
              /* non-JSON body — keep the status code */
            }
            state.autoloop.plannerLog = state.autoloop.plannerLog.filter((m) => m.who !== 'pending');
            state.autoloop.plannerLog.push({
              who: 'system',
              text: `[error] ${detail}`,
              ts: new Date().toISOString(),
            });
            paintPlanner();
          }
          // On success, do nothing — the planner_reply / planner_error SSE
          // handler upstairs clears the "thinking…" placeholder when the
          // Planner actually replies (or errors).
        } catch (err) {
          state.autoloop.plannerLog = state.autoloop.plannerLog.filter((m) => m.who !== 'pending');
          state.autoloop.plannerLog.push({
            who: 'system',
            text: `[error] ${(err && err.message) || 'send failed'}`,
            ts: new Date().toISOString(),
          });
          paintPlanner();
        } finally {
          btn.disabled = false;
          ta.disabled = false;
          ta.focus();
        }
      }

      // ─── Council detail ───────────────────────────────────────────
      function renderCouncilShell() {
        $('main').innerHTML = `
          <div class="topbar">
            <div class="item">council <strong id="c-id">…</strong></div>
            <div class="item">status <strong id="c-status">…</strong></div>
            <div class="item">round <strong id="c-round">0</strong></div>
            <div class="item">agents <strong id="c-agents">…</strong></div>
            <div class="item">task <strong id="c-task" style="font-weight:400;color:var(--muted)"></strong></div>
          </div>
          <div class="panes">
            <section class="pane single">
              <div class="paneHeader">Agent responses (live)</div>
              <div class="paneBody" id="c-stream"><div class="empty">Waiting for events…</div></div>
            </section>
          </div>
        `;
      }

      async function openCouncil(id) {
        renderCouncilShell();
        $('c-id').textContent = id;
        try {
          const r = await fetch(`/council/${encodeURIComponent(id)}/state`);
          const j = await r.json();
          if (j.ok) {
            state.council.session = j.session;
            paintCouncilState();
            // Replay existing responses as initial entries.
            (j.session.responses || []).forEach((resp) => {
              state.council.events.push({
                ts: resp.timestamp,
                who: resp.agent,
                round: resp.round,
                text: resp.content,
                consensus: resp.consensus,
              });
            });
            paintCouncilStream();
          }
        } catch (err) {
          /* ignore */
        }
        const es = new EventSource(`/council/${encodeURIComponent(id)}/events`);
        state.council.eventSource = es;
        es.addEventListener('snapshot', (e) => {
          state.council.session = JSON.parse(e.data);
          paintCouncilState();
        });
        es.addEventListener('council-event', (e) => {
          const ev = JSON.parse(e.data);
          handleCouncilEvent(ev);
        });
      }

      function paintCouncilState() {
        const s = state.council.session;
        if (!s) return;
        $('c-status').innerHTML = `<span class="badge ${s.status}">${s.status}</span>`;
        const rounds =
          s.responses && s.responses.length > 0
            ? Math.max(...s.responses.map((r) => r.round))
            : 0;
        $('c-round').textContent = rounds;
        $('c-agents').textContent = (s.config?.agents || []).map((a) => a.name).join(', ');
        $('c-task').textContent = s.task || '';
      }

      function handleCouncilEvent(ev) {
        // Materialise interesting events as stream entries.
        const ts = ev.timestamp || new Date().toISOString();
        switch (ev.type) {
          case 'session-start':
            state.council.events.push({ ts, who: 'system', text: `[session-start] ${ev.task || ''}` });
            break;
          case 'round-start':
            state.council.events.push({ ts, who: 'system', text: `── round ${ev.round} ──` });
            break;
          case 'agent-start':
            state.council.events.push({ ts, who: ev.agent, round: ev.round, text: '(thinking…)' });
            break;
          case 'agent-complete':
            state.council.events.push({
              ts,
              who: ev.agent,
              round: ev.round,
              text: ev.content || '',
              consensus: ev.consensus,
            });
            break;
          case 'round-end':
            state.council.events.push({ ts, who: 'system', text: `[round ${ev.round} → ${ev.status}]` });
            break;
          case 'complete':
            state.council.events.push({ ts, who: 'system', text: `[complete: ${ev.status}]` });
            break;
          case 'error':
            state.council.events.push({
              ts,
              who: 'system',
              text: `[error${ev.agent ? ' ' + ev.agent : ''}] ${ev.error || ''}`,
            });
            break;
          default:
            return; // skip chunks/tools at this resolution
        }
        // Update rounds count from latest event with a round
        if (ev.round && state.council.session) {
          const cur = state.council.session;
          cur.responses = cur.responses || [];
          paintCouncilState();
        }
        paintCouncilStream();
      }

      function paintCouncilStream() {
        const el = $('c-stream');
        if (!el) return;
        const items = state.council.events;
        if (!items.length) {
          el.innerHTML = '<div class="empty">Waiting for events…</div>';
          return;
        }
        el.innerHTML = items
          .map((e) => {
            const tag = e.consensus ? ' (consensus ✓)' : '';
            const round = e.round != null ? ` <span class="iter">r${e.round}</span>` : '';
            return `<div class="entry">
              <div class="entryHeader">
                <span class="who">${escapeHtml(e.who || '?')}</span>${round}
                <span>${fmtTime(e.ts)}${escapeHtml(tag)}</span>
              </div>
              <div class="entryBody text">${escapeHtml(e.text || '')}</div>
            </div>`;
          })
          .join('');
        el.scrollTop = el.scrollHeight;
      }

      // ─── Modal launcher (Council / Autoloop) ─────────────────────
      //
      // forgeNew uses a different shape (no form: ultraapp is interview-
      // driven, so POST /ultraapp/new with an empty body is enough). For
      // Council / Autoloop we need real form input; one modal handles
      // both, switching visible fields by state.tab.
      function openLauncherModal() {
        const root = $('modalRoot');
        $('modalTitle').textContent =
          state.tab === 'council' ? 'New Council session' : 'New Autoloop run';
        root.querySelectorAll('[data-for-tab]').forEach((el) => {
          const visible = el.dataset.forTab === state.tab;
          el.style.display = visible ? 'contents' : 'none';
          // Only the visible group's required fields actually count.
          el.querySelectorAll('input,textarea').forEach((f) => {
            if (visible && (f.name === 'task' || f.name === 'projectDir' || f.name === 'workspace')) {
              f.required = true;
            } else {
              f.required = false;
            }
          });
        });
        root.hidden = false;
        setTimeout(() => {
          const firstVisible = root.querySelector(
            `[data-for-tab="${state.tab}"] input, [data-for-tab="${state.tab}"] textarea`,
          );
          firstVisible?.focus();
        }, 0);
      }
      function closeLauncherModal() {
        $('modalRoot').hidden = true;
        $('modalForm').reset();
      }
      $('councilNew').addEventListener('click', openLauncherModal);
      $('autoloopNew').addEventListener('click', openLauncherModal);
      $('modalClose').addEventListener('click', closeLauncherModal);
      $('modalCancel').addEventListener('click', closeLauncherModal);
      $('modalRoot').addEventListener('click', (e) => {
        if (e.target.id === 'modalRoot') closeLauncherModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !$('modalRoot').hidden) closeLauncherModal();
      });
      $('modalForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const body = {};
        if (state.tab === 'council') {
          body.task = (fd.get('task') || '').toString().trim();
          body.projectDir = (fd.get('projectDir') || '').toString().trim();
          const mr = (fd.get('maxRounds') || '').toString().trim();
          if (mr) body.maxRounds = Number(mr);
        } else if (state.tab === 'autoloop') {
          body.workspace = (fd.get('workspace') || '').toString().trim();
          const pm = (fd.get('planner_model') || '').toString().trim();
          if (pm) body.planner_model = pm;
        }
        const url = state.tab === 'council' ? '/council/new' : '/autoloop/new';
        const submitBtn = $('modalSubmit');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Starting...';
        try {
          const r = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const j = await r.json();
          if (!j.ok) {
            alert('Failed: ' + (j.error || `HTTP ${r.status}`));
            return;
          }
          const id = j.id ?? j.run_id;
          closeLauncherModal();
          await refreshList();
          state.selectedId = id;
          renderList();
          openDetail(id);
        } catch (err) {
          alert('Failed: ' + err.message);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Start';
        }
      });

      // ─── Boot ────────────────────────────────────────────────────
      // Make the right "+ New" button visible for the default tab.
      $('autoloopNew').hidden = state.tab !== 'autoloop';
      $('councilNew').hidden = state.tab !== 'council';
      $('forgeNew').hidden = state.tab !== 'forge';
      refreshList();
    </script>
  </body>
</html>
